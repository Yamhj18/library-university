<p-toast />
<p-confirmdialog />

@if(isAuthPage()) {
    <router-outlet />
} @else {
    <div class="layout-container">
        <header class="layout-topbar">
            <div class="topbar-left">
                <div class="app-logo-container">
                    <div class="logo-icon">U</div>
                    <span class="app-logo">UNAMBA Library</span>
                </div>
            </div>
            
            <div class="topbar-right">
                <div class="user-profile" (click)="menu.toggle($event)">
                    <div class="user-info">
                        <span class="username">{{ authService.userName() }}</span>
                        <span class="user-role">{{ authService.isAdmin() ? 'Administrador' : 'Estudiante' }}</span>
                    </div>
                    <div class="user-avatar">
                        {{ authService.userName().charAt(0).toUpperCase() }}
                    </div>
                </div>
                <p-menu #menu [model]="profileItems" [popup]="true" styleClass="w-56" />
            </div>
        </header>
        
        <div class="layout-body">
            <aside class="layout-sidebar">
                <nav class="sidebar-content">
                    <div class="nav-section-title">Menu Principal</div>
                    <ul class="nav-list">
                        @for(item of navItems; track item.label) {
                            <li>
                                <a [routerLink]="item.routerLink" class="nav-link" routerLinkActive="active-link">
                                    <i [class]="item.icon"></i>
                                    <span>{{ item.label }}</span>
                                </a>
                            </li>
                        }
                    </ul>
                </nav>
            </aside>
            
            <main class="layout-main">
                <div class="content-wrapper">
                    <router-outlet />
                </div>
            </main>
        </div>
    </div>
}
