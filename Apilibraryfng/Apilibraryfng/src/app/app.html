<p-toast />
<p-confirmdialog />

@if(isAuthPage()) {
    <router-outlet />
} @else {
    <div class="layout-container">
        <header class="layout-topbar">
            <div class="topbar-left">
                <span class="app-logo">UNAMBA Library</span>
            </div>
            <div class="topbar-right">
                <div class="user-profile" (click)="menu.toggle($event)">
                    <p-avatar icon="pi pi-user" shape="circle" />
                    <span class="username">{{ authService.userName() }}</span>
                    <i class="pi pi-angle-down"></i>
                </div>
                <p-menu #menu [model]="profileItems" [popup]="true" />
            </div>
        </header>
        <div class="layout-body">
            <aside class="layout-sidebar">
                <nav class="sidebar-content">
                    <ul class="nav-list">
                        @for(item of navItems; track item.label) {
                            <li>
                                <a [routerLink]="item.routerLink" class="nav-link" routerLinkActive="active-link">
                                    <i [class]="item.icon"></i>
                                    <span>{{ item.label }}</span>
                                </a>
                            </li>
                        }
                    </ul>
                </nav>
            </aside>
            <main class="layout-main">
                <div class="content-wrapper">
                    <router-outlet />
                </div>
            </main>
        </div>
    </div>
}
